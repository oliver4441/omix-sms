services:
  - type: web
    name: omix-sms
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run db:seed && npm start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://omix-h2.onrender.com
      - key: DATABASE_URL
        value: file:./dev.db
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
      - key: OPENCODE_ZEN_API_KEY
        sync: false
